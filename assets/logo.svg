<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 100" role="img" aria-label="kysely-opentelemetry logo">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .logo-text { fill: #e6edf3; }
        .span-stroke { stroke: #a371f7; fill: none; }
        .span-fill { fill: #a371f7; }
        .guide { stroke: #a371f7; fill: none; }
      }
      @media (prefers-color-scheme: light) {
        .logo-text { fill: #24292f; }
        .span-stroke { stroke: #8250df; fill: none; }
        .span-fill { fill: #8250df; }
        .guide { stroke: #8250df; fill: none; }
      }
    </style>
  </defs>

  <!-- Trace-span waterfall: parent span, child span, and the SQL query span
       this library emits (solid), nested like a trace viewer's timeline. -->

  <!-- Root span -->
  <rect class="span-fill" x="8" y="27" width="98" height="11" rx="3" opacity="0.1"/>
  <rect class="span-stroke" x="8" y="27" width="98" height="11" rx="3" stroke-width="2" opacity="0.4"/>

  <!-- Child span -->
  <rect class="span-fill" x="22" y="44" width="74" height="11" rx="3" opacity="0.16"/>
  <rect class="span-stroke" x="22" y="44" width="74" height="11" rx="3" stroke-width="2" opacity="0.7"/>

  <!-- Query span (the CLIENT span this library emits) -->
  <rect class="span-fill" x="36" y="61" width="54" height="11" rx="3"/>
  <rect class="span-stroke" x="36" y="61" width="54" height="11" rx="3" stroke-width="2"/>

  <!-- Nesting guides -->
  <path class="guide" d="M13 38 L13 49.5 L22 49.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
  <path class="guide" d="M27 55 L27 66.5 L36 66.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Logo text -->
  <text class="logo-text" x="120" y="66" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="bold" textLength="648" lengthAdjust="spacingAndGlyphs">kysely-opentelemetry</text>
</svg>
